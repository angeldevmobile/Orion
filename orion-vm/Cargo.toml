[package]
name = "orion-vm"
version = "0.1.0"
edition = "2021"
description = "Orion Language Virtual Machine"

[[bin]]
name = "orion"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ureq = { version = "2", features = ["json"] }
tiny_http = "0.12"
