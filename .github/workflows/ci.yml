name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orion-vm

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libffi-dev \
            libssl-dev \
            libssh2-1-dev \
            libx11-dev \
            libxcb-composite0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: orion-vm

      - name: cargo test (unit)
        run: cargo test --lib

      - name: cargo test (regression)
        run: cargo test --test regression

      - name: cargo clippy
        run: cargo clippy --lib

      - name: cargo fmt check
        run: cargo fmt --check
